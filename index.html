<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #eef2f7, #f7f9fc);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    transition: 0.3s;
}

body.dark {
    background: #0f1115;
    color: white;
}

.container {
    background: white;
    padding: 32px 28px;
    border-radius: 22px;
    width: 360px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.12);
    transition: 0.3s;
}

body.dark .container {
    background: #1b1f27;
}

h1 {
    margin: 0;
    font-size: 24px;
    letter-spacing: 1px;
}

.desc {
    font-size: 13px;
    color: gray;
    margin: 12px 0 18px;
    line-height: 1.4;
}

body.dark .desc {
    color: #aaa;
}

select {
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
    outline: none;
    margin-top: 10px;
    width: 100%;
    text-align: center;
    background: #f5f6f8;
}

body.dark select {
    background: #2a2f3a;
    color: white;
    border: 1px solid #444;
}

.time-box {
    margin-top: 14px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

.time-box select {
    width: 90px;
}

#labelText {
    margin-top: 14px;
    font-size: 14px;
}

button.main {
    margin-top: 18px;
    padding: 11px 18px;
    background: #111;
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    width: 65%;
    transition: 0.2s;
}

button.main:hover {
    transform: scale(1.03);
}

body.dark button.main {
    background: white;
    color: black;
}

.result {
    margin-top: 20px;
}

.time {
    margin: 6px auto;
    padding: 10px;
    border-radius: 12px;
    width: 85%;
    background: rgba(0,0,0,0.04);
    transition: 0.2s;
}

body.dark .time {
    background: rgba(255,255,255,0.06);
}

.good { color: #2ecc71; font-weight: bold; }
.ok { color: #f39c12; font-weight: bold; }
.bad { color: #e74c3c; font-weight: bold; }

.note {
    margin-top: 10px;
    font-size: 12px;
    color: #666;
}

body.dark .note {
    color: #ccc;
}

.theme-btn {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 140px;
    height: 38px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    background: #111;
    color: white;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    transition: 0.2s;
}

.theme-btn:hover {
    transform: translateX(-50%) scale(1.05);
}

body.dark .theme-btn {
    background: white;
    color: black;
}
</style>
